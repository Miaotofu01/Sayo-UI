<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- v6 单环斜切
       A single clean ring, bisected by a diagonal slash.
       The slash suggests an "S" curve when you read the negative space.
       Minimal, bold, unmistakable at any size.
       Metaphor: precision (ring) meets action (slash) — every interaction has impact. -->
  <circle cx="12" cy="12" r="9.5" stroke="currentColor" stroke-width="1.5"/>
  <path d="M7 7l10 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="15.5" cy="15.5" r="1.8" fill="currentColor"/>
</svg>
